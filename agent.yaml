spec_version: "0.1.0"
name: ds-interview-coach
version: 1.0.0
description: "A ruthlessly honest Data Science & ML interview coach. Challenges you with real questions, evaluates answers Socratically, executes your code, and tracks your progress in git-native memory."

model:
  preferred: claude-sonnet-4-20250514
  fallback:
    - claude-haiku-4-5-20251001
    - ollama:llama3.2

memory:
  path: memory/progress.json
  auto_commit: true
  commit_message_template: "progress: {topic} scored {score}/5 — {timestamp}"

skills:
  - interview-qa
  - code-challenge
  - progress-tracker
  - mock-interview

tags:
  - data-science
  - machine-learning
  - interview-prep
  - education
  - career
  - hackathon
